<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Самодельная Африка — Чат</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js">
    </script>

    <style>
        /* ============================================================
           ПОЛНОСТЬЮ НОВЫЙ ДИЗАЙН — КАК В TELEGRAM
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        /* ----- ОБЩИЙ КОНТЕЙНЕР ----- */
        .app {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            max-height: 800px;
            background: #1a1a1a;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.9);
            position: relative;
        }

        /* ============================================================
           ЭКРАН ВХОДА (ПАРОЛЬ)
           ============================================================ */
        #loginScreen {
            position: absolute;
            inset: 0;
            background: #1a1a1a;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 28px;
            transition: opacity 0.4s;
        }
        #loginScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loginScreen .icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        #loginScreen h2 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        #loginScreen p {
            color: #888;
            font-size: 15px;
            margin-bottom: 24px;
        }
        #loginScreen .row {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 320px;
        }
        #loginScreen input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 30px;
            border: 2px solid #333;
            background: #111;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        #loginScreen input:focus {
            border-color: #4a7cf7;
        }
        #loginScreen button {
            padding: 14px 28px;
            border-radius: 30px;
            border: none;
            background: #4a7cf7;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        #loginScreen button:hover {
            background: #5a8cf7;
        }
        #loginError {
            color: #f55;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        /* ============================================================
           ХЕДЕР ЧАТА
           ============================================================ */
        .chat-header {
            background: #1a1a1a;
            padding: 14px 20px 10px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #4a7cf7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .chat-header .info h2 {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
        }

        .chat-header .info .status {
            font-size: 13px;
            color: #4caf50;
        }

        .chat-header .info .status.offline {
            color: #888;
        }

        .chat-header .actions {
            display: flex;
            gap: 6px;
            color: #888;
            font-size: 18px;
        }

        .chat-header .actions span {
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .chat-header .actions span:hover {
            background: #2a2a2a;
            color: #fff;
        }

        /* ============================================================
           БАР СМЕНЫ ИМЕНИ
           ============================================================ */
        .name-bar {
            background: #141414;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .name-bar .label {
            color: #666;
            font-size: 13px;
        }

        .name-bar .name {
            color: #4a7cf7;
            font-weight: 600;
            font-size: 14px;
        }

        .name-bar .edit-btn {
            color: #666;
            font-size: 12px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 2px 10px;
            border-radius: 12px;
            transition: 0.2s;
        }

        .name-bar .edit-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .name-edit {
            display: none;
            gap: 8px;
            align-items: center;
        }

        .name-edit.open {
            display: flex;
        }

        .name-edit input {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-size: 14px;
            outline: none;
            width: 140px;
        }

        .name-edit input:focus {
            border-color: #4a7cf7;
        }

        .name-edit button {
            padding: 6px 16px;
            border-radius: 20px;
            border: none;
            background: #4a7cf7;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }

        .name-edit .cancel {
            background: #333;
        }

        /* ============================================================
           ОБЛАСТЬ СООБЩЕНИЙ
           ============================================================ */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 8px;
            background: #111;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        /* ----- ОДНО СООБЩЕНИЕ ----- */
        .msg {
            display: flex;
            gap: 10px;
            padding: 6px 12px 6px 10px;
            border-radius: 14px;
            max-width: 88%;
            animation: pop 0.15s ease;
        }

        .msg .ava {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: #fff;
        }

        .msg .body {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .msg .user {
            font-size: 12px;
            font-weight: 600;
            color: #4a7cf7;
        }

        .msg .text {
            font-size: 15px;
            color: #eee;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .msg .time {
            font-size: 10px;
            color: #555;
            margin-top: 1px;
        }

        /* Свои сообщения (справа) */
        .msg.self {
            align-self: flex-end;
            background: #2a2a3a;
            border-radius: 16px 16px 4px 16px;
        }

        .msg.self .user {
            color: #4caf50;
        }

        /* Чужие сообщения (слева) */
        .msg.other {
            align-self: flex-start;
            background: #1e1e1e;
            border-radius: 16px 16px 16px 4px;
        }

        /* Системные (по центру) */
        .msg.sys {
            align-self: center;
            background: transparent;
            max-width: 100%;
            padding: 4px 12px;
        }

        .msg.sys .text {
            color: #555;
            font-size: 12px;
            font-style: italic;
            text-align: center;
        }
        .msg.sys .ava {
            display: none;
        }

        @keyframes pop {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .empty-state {
            color: #444;
            text-align: center;
            padding: 50px 20px;
            font-size: 14px;
        }

        .empty-state .big {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
        }

        /* ============================================================
           ПАНЕЛЬ ЭМОДЗИ
           ============================================================ */
        .emoji-panel {
            display: none;
            background: #141414;
            padding: 10px 14px;
            border-top: 1px solid #222;
            flex-wrap: wrap;
            gap: 4px;
            max-height: 110px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .emoji-panel.open {
            display: flex;
        }

        .emoji-panel span {
            font-size: 24px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 6px;
            transition: 0.15s;
        }

        .emoji-panel span:hover {
            background: #2a2a2a;
            transform: scale(1.15);
        }

        /* ============================================================
           ВВОД СООБЩЕНИЯ
           ============================================================ */
        .input-row {
            background: #141414;
            padding: 10px 16px 14px;
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-row .emoji-btn {
            color: #555;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .input-row .emoji-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .input-row input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 24px;
            border: 2px solid #2a2a2a;
            background: #0a0a0a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .input-row input:focus {
            border-color: #4a7cf7;
        }

        .input-row input::placeholder {
            color: #555;
        }

        .input-row .send {
            padding: 10px 22px;
            border-radius: 24px;
            border: none;
            background: #4a7cf7;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-row .send:hover {
            background: #5a8cf7;
        }

        .input-row .send:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 520px) {
            body {
                padding: 0;
            }
            .app {
                max-width: 100%;
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
            #loginScreen {
                border-radius: 0;
            }
            .messages {
                padding: 10px 12px 6px;
            }
            .msg {
                max-width: 94%;
            }
            .name-edit.open {
                flex-wrap: wrap;
            }
            .name-edit input {
                width: 100%;
            }
            #loginScreen .row {
                flex-direction: column;
            }
            #loginScreen button {
                width: 100%;
            }
        }

        /* ============================================================
           ОНЛАЙН-БЕЙДЖ
           ============================================================ */
        .online-badge {
            color: #555;
            font-size: 13px;
            padding-left: 4px;
        }
        .online-badge strong {
            color: #4caf50;
        }
    </style>
</head>
<body>

    <!-- ============================================================
    ПРИЛОЖЕНИЕ
    ============================================================ -->
    <div class="app">

        <!-- ===== ЭКРАН ВХОДА ===== -->
        <div id="loginScreen">
            <div class="icon">🔒</div>
            <h2>Закрытый чат</h2>
            <p>Введите пароль для входа</p>
            <div class="row">
                <input type="password" id="pwdInput" placeholder="Пароль..." autofocus />
                <button id="loginBtn">Войти</button>
            </div>
            <div id="loginError">❌ Неверный пароль</div>
        </div>

        <!-- ===== ХЕДЕР ===== -->
        <div class="chat-header">
            <div class="left">
                <div class="avatar">🌍</div>
                <div class="info">
                    <h2>Общий чат</h2>
                    <div class="status" id="statusBadge">🟢 <span id="onlineCount">0</span> онлайн</div>
                </div>
            </div>
            <div class="actions">
                <span title="Поиск">🔍</span>
                <span title="Ещё">⋯</span>
            </div>
        </div>

        <!-- ===== БАР ИМЕНИ ===== -->
        <div class="name-bar">
            <span class="label">👤 Вы:</span>
            <span class="name" id="displayName">Гость</span>
            <button class="edit-btn" id="changeNameBtn">✎ изменить</button>

            <div class="name-edit" id="nameEdit">
                <input type="text" id="nameInput" placeholder="Новое имя..." />
                <button id="saveNameBtn">Сохранить</button>
                <button class="cancel" id="cancelNameBtn">Отмена</button>
            </div>
        </div>

        <!-- ===== СООБЩЕНИЯ ===== -->
        <div class="messages" id="messagesArea">
            <div class="empty-state">
                <span class="big">💬</span>
                Загрузка сообщений...
            </div>
        </div>

        <!-- ===== ЭМОДЗИ ===== -->
        <div class="emoji-panel" id="emojiPanel">
            <span>😊</span><span>😂</span><span>🤣</span><span>❤️</span><span>🔥</span>
            <span>👍</span><span>👎</span><span>🙏</span><span>💪</span><span>🎉</span>
            <span>🥳</span><span>🤔</span><span>😍</span><span>🥰</span><span>😘</span>
            <span>😎</span><span>🤗</span><span>😇</span><span>🤩</span><span>😈</span>
            <span>👀</span><span>💀</span><span>👻</span><span>🎃</span><span>💩</span>
            <span>🤡</span><span>👽</span><span>🤖</span><span>👾</span>
        </div>

        <!-- ===== ВВОД ===== -->
        <div class="input-row">
            <span class="emoji-btn" id="emojiBtn">😊</span>
            <input type="text" id="msgInput" placeholder="Напишите сообщение..." disabled />
            <button class="send" id="sendBtn" disabled>
                <span>➤</span> Отправить
            </button>
        </div>

    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. ПАРОЛЬ
            // ============================================================
            const PASSWORD = 'grisha';

            const loginScreen = document.getElementById('loginScreen');
            const pwdInput = document.getElementById('pwdInput');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');

            function doLogin() {
                if (pwdInput.value.trim() === PASSWORD) {
                    loginScreen.classList.add('hidden');
                    initChat();
                } else {
                    loginError.style.display = 'block';
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            }

            loginBtn.addEventListener('click', doLogin);
            pwdInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') doLogin();
            });

            // ============================================================
            // 2. FIREBASE
            // ============================================================
            const firebaseConfig = {
                apiKey: "AIzaSyC2ZRgWpC4E3ZfTgX5Yq7VvR8wN9xMpLqA",
                authDomain: "samodelnaya-afrika-chat.firebaseapp.com",
                databaseURL: "https://samodelnaya-africa-default-rtdb.firebaseio.com/",
                projectId: "samodelnaya-afrika-chat",
                storageBucket: "samodelnaya-afrika-chat.appspot.com",
                messagingSenderId: "123456789012",
                appId: "1:123456789012:web:abcdef1234567890"
            };

            let db = null;

            // Имя и ID пользователя
            let myName = localStorage.getItem('chatName') || 'Гость';
            let myId = localStorage.getItem('chatId') || 'user_' + Math.random().toString(36).substr(2, 8);

            const displayName = document.getElementById('displayName');
            displayName.textContent = myName;

            // ============================================================
            // 3. ИНИЦИАЛИЗАЦИЯ
            // ============================================================
            function initChat() {
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    db = firebase.database();
                    console.log('✅ Firebase подключен');

                    // Активируем поля
                    document.getElementById('msgInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;

                    // Статус
                    document.getElementById('statusBadge').innerHTML =
                        '🟢 <span id="onlineCount">0</span> онлайн';

                    loadMessages();
                    setupSending();
                    setupNameChange();
                    setupEmoji();
                    setupOnline();
                    setupClear();

                } catch (e) {
                    console.error('❌ Ошибка:', e);
                    document.getElementById('statusBadge').textContent = '🔴 Ошибка';
                    document.getElementById('messagesArea').innerHTML =
                        '<div class="empty-state"><span class="big">⚠️</span>Не удалось подключиться</div>';
                }
            }

            // ============================================================
            // 4. ЗАГРУЗКА СООБЩЕНИЙ
            // ============================================================
            function loadMessages() {
                const area = document.getElementById('messagesArea');
                const ref = db.ref('chat/messages');

                let first = true;

                ref.orderByChild('timestamp').limitToLast(100).on('child_added', function(snap) {
                    const data = snap.val();
                    if (!data) return;

                    if (first) {
                        area.innerHTML = '';
                        first = false;
                    }

                    // Убираем дубли
                    if (area.querySelector(`[data-key="${snap.key}"]`)) return;

                    // Цвет аватарки
                    const colors = ['#4a7cf7', '#6b4a7a', '#3d8c6f', '#b8860b', '#c0392b',
                        '#2980b9', '#8e44ad', '#d35400', '#27ae60', '#2c3e50', '#7f8c8d'
                    ];
                    let hash = 0;
                    for (let i = 0; i < data.user.length; i++) {
                        hash = data.user.charCodeAt(i) + ((hash << 5) - hash);
                    }
                    const color = colors[Math.abs(hash) % colors.length];
                    const initial = data.user.charAt(0).toUpperCase();

                    const isSystem = data.system === true;
                    const isSelf = data.user === myName;

                    // Создаём элемент
                    const msg = document.createElement('div');
                    msg.className = 'msg';

                    if (isSystem) {
                        msg.className = 'msg sys';
                    } else if (isSelf) {
                        msg.className = 'msg self';
                    } else {
                        msg.className = 'msg other';
                    }

                    msg.setAttribute('data-key', snap.key);

                    if (isSystem) {
                        msg.innerHTML = `
                            <div class="body">
                                <div class="text">${data.text}</div>
                            </div>
                        `;
                    } else {
                        msg.innerHTML = `
                            <div class="ava" style="background:${color};">${initial}</div>
                            <div class="body">
                                <div class="user">${data.user}</div>
                                <div class="text">${data.text}</div>
                                <div class="time">${data.time || '--:--'}</div>
                            </div>
                        `;
                    }

                    area.appendChild(msg);
                    area.scrollTop = area.scrollHeight;
                });

                // Если нет сообщений
                setTimeout(() => {
                    if (first) {
                        area.innerHTML = `
                            <div class="empty-state">
                                <span class="big">💬</span>
                                Напишите первое сообщение!
                            </div>
                        `;
                    }
                }, 1500);
            }

            // ============================================================
            // 5. ОТПРАВКА
            // ============================================================
            function setupSending() {
                const input = document.getElementById('msgInput');
                const btn = document.getElementById('sendBtn');

                function send() {
                    const text = input.value.trim();
                    if (!text) return;

                    const now = new Date();
                    const time = now.getHours().toString().padStart(2, '0') + ':' +
                        now.getMinutes().toString().padStart(2, '0');

                    const ref = db.ref('chat/messages');
                    ref.push({
                        user: myName,
                        text: text,
                        time: time,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        input.value = '';
                        input.focus();
                    }).catch(err => {
                        alert('Ошибка: ' + err.message);
                    });
                }

                btn.addEventListener('click', send);
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        send();
                    }
                });
            }

            // ============================================================
            // 6. СМЕНА ИМЕНИ
            // ============================================================
            function setupNameChange() {
                const changeBtn = document.getElementById('changeNameBtn');
                const nameEdit = document.getElementById('nameEdit');
                const nameInput = document.getElementById('nameInput');
                const saveBtn = document.getElementById('saveNameBtn');
                const cancelBtn = document.getElementById('cancelNameBtn');

                changeBtn.addEventListener('click', function() {
                    nameEdit.classList.add('open');
                    nameInput.value = myName;
                    nameInput.focus();
                    changeBtn.style.display = 'none';
                });

                saveBtn.addEventListener('click', function() {
                    const newName = nameInput.value.trim();
                    if (newName) {
                        myName = newName;
                        localStorage.setItem('chatName', myName);
                        displayName.textContent = myName;
                        nameEdit.classList.remove('open');
                        changeBtn.style.display = 'inline';
                    }
                });

                cancelBtn.addEventListener('click', function() {
                    nameEdit.classList.remove('open');
                    changeBtn.style.display = 'inline';
                });

                nameInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') saveBtn.click();
                    if (e.key === 'Escape') cancelBtn.click();
                });
            }

            // ============================================================
            // 7. ЭМОДЗИ
            // ============================================================
            function setupEmoji() {
                const emojiBtn = document.getElementById('emojiBtn');
                const panel = document.getElementById('emojiPanel');
                const input = document.getElementById('msgInput');

                emojiBtn.addEventListener('click', function() {
                    panel.classList.toggle('open');
                });

                panel.addEventListener('click', function(e) {
                    if (e.target.tagName === 'SPAN') {
                        input.value += e.target.textContent;
                        input.focus();
                        panel.classList.remove('open');
                    }
                });

                document.addEventListener('click', function(e) {
                    if (!panel.contains(e.target) && e.target !== emojiBtn) {
                        panel.classList.remove('open');
                    }
                });
            }

            // ============================================================
            // 8. ОНЛАЙН
            // ============================================================
            function setupOnline() {
                const userRef = db.ref('chat/users');
                const onlineSpan = document.getElementById('onlineCount');

                localStorage.setItem('chatId', myId);

                const myStatus = userRef.child(myId);
                myStatus.set({
                    online: true,
                    lastSeen: firebase.database.ServerValue.TIMESTAMP
                });

                setInterval(() => {
                    myStatus.update({ lastSeen: firebase.database.ServerValue.TIMESTAMP });
                }, 10000);

                window.addEventListener('beforeunload', function() {
                    myStatus.update({ online: false });
                });

                userRef.on('value', function(snap) {
                    let count = 0;
                    const now = Date.now();
                    snap.forEach(function(child) {
                        const data = child.val();
                        if (data && data.online && (now - data.lastSeen < 30000)) {
                            count++;
                        }
                    });
                    onlineSpan.textContent = count;
                });
            }

            // ============================================================
            // 9. ОЧИСТКА (админ — двойной клик по хедеру)
            // ============================================================
            function setupClear() {
                document.querySelector('.chat-header').addEventListener('dblclick', function() {
                    const pwd = prompt('Введите админ-пароль:');
                    if (pwd === 'admin123') {
                        if (confirm('Очистить все сообщения?')) {
                            db.ref('chat/messages').remove().then(() => {
                                document.getElementById('messagesArea').innerHTML = `
                                    <div class="empty-state">
                                        <span class="big">🗑️</span>
                                        Чат очищен администратором
                                    </div>
                                `;
                                const now = new Date();
                                const time = now.getHours().toString().padStart(2, '0') + ':' +
                                    now.getMinutes().toString().padStart(2, '0');
                                db.ref('chat/messages').push({
                                    user: 'Гриша',
                                    text: '🗑️ Чат очищен администратором',
                                    time: time,
                                    system: true,
                                    timestamp: firebase.database.ServerValue.TIMESTAMP
                                });
                            }).catch(err => alert('Ошибка: ' + err.message));
                        }
                    } else if (pwd !== null) {
                        alert('Неверный пароль');
                    }
                });
            }

        })();
    </script>

</body>
